name: PR check

# Gate for pull requests: builds the WASM core and the UI (typecheck +
# vite build) but never deploys. Mirrors deploy-pages.yml's build job —
# see that file for the overall build shape and caveats.
#
# The NetHack core build is cached (see "Cache built NetHack core" below):
# most PRs only touch packages/ui, so this usually skips the ~90s core
# compile entirely and just typechecks + bundles the UI.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Resolve submodule commit
        id: submodule
        run: echo "sha=$(git -C vendor/nethack rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Every generated file here is a pure function of the pinned vendor/nethack
      # commit + our patch/scripts + the emsdk version — if none of those moved,
      # last run's output is bit-for-bit what we'd rebuild, so skip straight to
      # the (fast) UI build instead of a fresh ~90s core compile.
      - name: Cache built NetHack core
        id: cache-core
        uses: actions/cache@v4
        with:
          path: |
            packages/core-wasm/artifacts
            packages/ui/public/core
            packages/ui/public/tiles
            packages/ui/public/extcmds.json
            packages/ui/public/status-icons
            packages/ui/public/map-marks
            packages/ui/public/tombstone.png
            packages/ui/public/roles.json
            packages/ui/public/toolbar
            packages/ui/public/LICENSE-NETHACK.txt
          key: nhcore-${{ runner.os }}-${{ steps.submodule.outputs.sha }}-${{ hashFiles('patches/**', 'scripts/setup-core.sh', 'packages/core-wasm/**') }}-emsdk6.0.2

      - name: Install C toolchain
        if: steps.cache-core.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      # Pinned to the same version verified locally (see ~/emsdk/upstream/emscripten/emscripten-version.txt).
      - uses: mymindstorm/setup-emsdk@v14
        if: steps.cache-core.outputs.cache-hit != 'true'
        with:
          version: 6.0.2

      - name: Prep NetHack core (patch + configure + generate assets)
        if: steps.cache-core.outputs.cache-hit != 'true'
        run: bash scripts/setup-core.sh

      - name: Build NetHack core to WASM
        if: steps.cache-core.outputs.cache-hit != 'true'
        run: npm run build:core

      - name: Typecheck UI
        run: npx tsc --noEmit -p packages/ui/tsconfig.json

      - name: Build UI (project-page base path)
        run: npm run build -w @nethack-universal/ui -- --base=/${{ github.event.repository.name }}/
