<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetHack</title>
    <style>
      /* ---------------------------------------------------------------- *
       * Design tokens. One dark "dungeon stone + gold" language for the
       * whole app; every component color below derives from these.
       * ---------------------------------------------------------------- */
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --panel: #14171c;
        --panel-2: #1a1e24;
        --border: #262b33;
        --border-strong: #3a4250;
        --text: #d6d9de;
        --text-dim: #7d8590;
        --accent: #e9c46a; /* gold */
        --good: #6fbf73;
        --warn: #d9a648;
        --bad: #d96459;
        --sel: #35406a; /* selection blue */
        --sel-border: #5a6ab0;
        --font-ui: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        --font-display: "Iowan Old Style", Palatino, Georgia, serif;
        --hud-font-size: 14px;
        /* Splitter-adjustable pane sizes (layout.ts persists these) */
        --toprow-height: 210px;
        --sidebar-width: 250px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-ui);
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      button { font: inherit; cursor: pointer; }

      /* ---------------------------------------------------------------- *
       * Header
       * ---------------------------------------------------------------- */
      header {
        padding: 4px 12px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      /* Menubar (qt_main.cpp Game/Gear/Action/Magic/Info/Help) */
      #menubar { display: flex; }
      .menubar-menu { position: relative; }
      .menubar-menu > button {
        background: none;
        border: none;
        color: var(--text);
        padding: 4px 9px;
        border-radius: 4px;
      }
      .menubar-menu > button:hover, .menubar-menu.open > button { background: var(--sel); color: #fff; }
      .menubar-drop {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        z-index: 30;
        min-width: 200px;
        background: var(--panel-2);
        border: 1px solid var(--border-strong);
        border-radius: 6px;
        padding: 4px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      }
      .menubar-menu.open .menubar-drop { display: block; }
      .menubar-item {
        display: block;
        width: 100%;
        text-align: left;
        background: none;
        border: none;
        color: var(--text);
        padding: 4px 10px;
        border-radius: 4px;
        white-space: nowrap;
      }
      .menubar-item:hover { background: var(--sel); color: #fff; }
      .menubar-sep { height: 1px; background: var(--border); margin: 4px 6px; }

      /* Toolbar (qt_main.cpp AddToolButton row) */
      #toolbar { display: flex; gap: 2px; }
      .toolbar-btn {
        background: none;
        border: 1px solid transparent;
        border-radius: 4px;
        padding: 3px 5px;
        display: flex;
        align-items: center;
      }
      .toolbar-btn:hover { background: var(--sel); border-color: var(--sel-border); }
      .toolbar-btn img { image-rendering: pixelated; display: block; filter: invert(0.85); }
      .refused { animation: refused-flash 0.3s; }
      @keyframes refused-flash {
        50% { background: var(--bad); }
      }
      #wordmark {
        font-family: var(--font-display);
        font-size: 17px;
        color: var(--accent);
        letter-spacing: 0.04em;
        white-space: nowrap;
      }
      #header-controls { display: flex; align-items: center; gap: 14px; color: var(--text-dim); }
      .ctl { display: flex; align-items: center; gap: 4px; }
      .ctl button {
        background: var(--panel-2);
        border: 1px solid var(--border-strong);
        color: var(--text);
        border-radius: 3px;
        min-width: 22px;
        height: 22px;
        padding: 0 6px;
      }
      .ctl button:hover { background: var(--sel); }
      .ctl button:disabled { opacity: 0.4; cursor: default; }
      #fontsize-label { min-width: 5em; text-align: center; }

      /* ---------------------------------------------------------------- *
       * Qt-classic arrangement: messages | paperdoll | status on top,
       * full-width map below (splitters between the bands).
       * ---------------------------------------------------------------- */
      #toprow {
        display: flex;
        height: var(--toprow-height);
        min-height: 110px;
        flex-shrink: 0;
        background: var(--panel);
      }
      #messages {
        flex: 1;
        min-width: 0;
        overflow-y: auto;
        padding: 6px 10px;
        font-size: var(--hud-font-size);
        color: #bcc4bd;
        border-right: 1px solid var(--border);
      }
      #messages div { margin: 1px 0; }
      #paperdoll {
        width: 178px;
        flex-shrink: 0;
        overflow-y: auto;
        border-right: 1px solid var(--border);
      }
      #status {
        width: 40%;
        max-width: 560px;
        min-width: 300px;
        flex-shrink: 0;
        overflow-y: auto;
        padding: 6px 12px;
        font-size: var(--hud-font-size);
      }

      .splitter-h {
        height: 5px;
        flex-shrink: 0;
        cursor: row-resize;
        background: var(--border);
        border-top: 1px solid var(--border-strong);
      }
      .splitter-h:hover, .splitter-v:hover { background: var(--sel-border); }
      .splitter-v {
        width: 5px;
        flex-shrink: 0;
        cursor: col-resize;
        background: var(--border);
        border-left: 1px solid var(--border-strong);
      }

      #main { flex: 1; display: flex; min-height: 0; }
      #mapwrap {
        flex: 1;
        overflow: auto;
        min-height: 0;
        background: #000;
      }
      #map { image-rendering: pixelated; display: block; }
      #sidebar {
        width: var(--sidebar-width);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        background: var(--panel);
        min-height: 0;
      }
      body.sidebar-collapsed #sidebar, body.sidebar-collapsed #vsplit { display: none; }
      #perminvent { flex: 1; overflow-y: auto; padding: 4px 0; min-height: 0; }
      #perminvent .menu-title {
        padding: 6px 10px;
        font-family: var(--font-display);
        font-size: 13px;
        color: var(--accent);
        border-bottom: 1px solid var(--border);
      }
      #perminvent .menu-row { padding: 2px 10px; font-size: 13px; }

      /* ---------------------------------------------------------------- *
       * Status panel (Qt's icon-grid status widget)
       * ---------------------------------------------------------------- */
      .status-head {
        font-family: var(--font-display);
        font-size: 1.25em;
        color: var(--accent);
        text-align: center;
        margin: 2px 0 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .status-bars { display: flex; flex-direction: column; gap: 2px; margin-bottom: 6px; }
      .hp-bar { height: 5px; background: var(--panel-2); border-radius: 2px; overflow: hidden; }
      .hp-bar-fill { height: 100%; transition: width 0.2s ease-out; }
      .status-attrs {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 4px;
        margin-bottom: 6px;
      }
      .status-attr {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        padding: 3px 0 2px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 0.85em;
        white-space: nowrap;
      }
      .status-attr img { image-rendering: pixelated; }
      .status-line { display: flex; flex-wrap: wrap; align-items: center; white-space: pre; }
      .status-chip { display: inline-flex; align-items: center; white-space: pre; }
      .status-icon { image-rendering: pixelated; vertical-align: middle; margin-right: 1px; }
      /* Change-flash (qt_stat.cpp): green improved, red worsened, blue changed */
      .flash-up { color: var(--good); }
      .flash-down { color: var(--bad); }
      .flash-changed { color: #8fb8ff; }
      .status-attr.flash-up { border-color: var(--good); }
      .status-attr.flash-down { border-color: var(--bad); }
      .status-attr.flash-changed { border-color: #8fb8ff; }

      /* Blocking --More-- acknowledgment (qt_bind.cpp qt_more) */
      .more-chip {
        display: inline-block;
        color: var(--accent);
        font-weight: 700;
        animation: splash-pulse 1.2s ease-in-out infinite;
      }

      /* ---------------------------------------------------------------- *
       * Footer
       * ---------------------------------------------------------------- */
      #footer {
        padding: 3px 10px;
        background: var(--bg);
        border-top: 1px solid var(--border);
        color: #4d5560;
        font-size: 11px;
        text-align: center;
        flex-shrink: 0;
      }
      #footer a { color: #6a8; }

      /* ---------------------------------------------------------------- *
       * Paperdoll
       * ---------------------------------------------------------------- */
      #paperdoll .menu-title {
        padding: 5px 10px;
        font-family: var(--font-display);
        font-size: 13px;
        color: var(--accent);
        border-bottom: 1px solid var(--border);
      }
      .paperdoll-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 3px;
        padding: 6px;
      }
      .paperdoll-cell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 3px 2px;
        border: 1px solid var(--border);
        border-radius: 4px;
        min-height: 40px;
        justify-content: center;
      }
      .paperdoll-cell.filled { border-color: #3a4a3a; background: #1c241c; }
      .paperdoll-cell.empty { border-style: dashed; opacity: 0.3; }
      .paperdoll-label { font-size: 9px; color: var(--text-dim); text-align: center; line-height: 1.1; }

      /* ---------------------------------------------------------------- *
       * Menu / prompt / text overlays
       * ---------------------------------------------------------------- */
      #overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      .menu {
        background: var(--panel);
        border: 1px solid var(--border-strong);
        border-radius: 6px;
        max-height: 82vh;
        max-width: 82vw;
        display: flex;
        flex-direction: column;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
      }
      .menu-title {
        padding: 10px 14px;
        font-family: var(--font-display);
        font-weight: 600;
        color: var(--accent);
        border-bottom: 1px solid var(--border);
      }
      /* Qt's Ok/Cancel/All/None/Invert/Search row (qt_menu.cpp) */
      .menu-buttons {
        display: flex;
        gap: 6px;
        padding: 10px 14px 8px;
        border-bottom: 1px solid var(--border);
      }
      .menu-buttons button {
        background: var(--panel-2);
        border: 1px solid var(--border-strong);
        color: var(--text);
        border-radius: 4px;
        padding: 4px 12px;
      }
      .menu-buttons button:hover:not(:disabled) { background: var(--sel); }
      .menu-buttons button:disabled { opacity: 0.35; cursor: default; }
      .menu-search {
        margin: 8px 14px;
        padding: 5px 8px;
        background: var(--bg);
        border: 1px solid var(--border-strong);
        border-radius: 4px;
        color: #eee;
        font: inherit;
      }
      .menu-search:focus { outline: none; border-color: #6a7; }
      .menu-count {
        min-width: 2.5em;
        text-align: right;
        color: var(--warn);
        font-weight: 600;
      }
      .atr-bold { font-weight: 700; }
      .atr-dim { opacity: 0.6; }
      .atr-italic { font-style: italic; }
      .atr-uline { text-decoration: underline; }
      .atr-blink { animation: splash-pulse 1.2s ease-in-out infinite; }
      .atr-inverse { background: var(--text); color: var(--bg); }
      .menu-list { overflow-y: auto; padding: 4px 0; }
      .menu-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 3px 14px;
        font-size: 14px;
        color: var(--text);
      }
      .menu-row.header { color: var(--text-dim); font-weight: 600; padding-top: 8px; }
      .menu-row.selectable { cursor: pointer; }
      .menu-row.selectable:hover { background: #2b2b3a; }
      .menu-row.selected { background: var(--sel); color: #fff; }
      .menu-accel {
        display: inline-block;
        width: 1.2em;
        text-align: center;
        color: var(--accent);
        font-weight: 600;
      }
      .menu-row.selected .menu-accel { color: #fff; }
      .menu-tile { image-rendering: pixelated; width: 24px; height: 24px; }
      .menu-text { flex: 1; }
      .extcmd { min-width: 360px; }
      .extcmd .menu-accel { width: auto; min-width: 7em; text-align: left; color: var(--accent); }
      .extcmd .menu-text { color: #99a; }
      .menu-footer {
        padding: 8px 14px;
        border-top: 1px solid var(--border);
        color: var(--text-dim);
        font-size: 12px;
      }
      .prompt-input {
        margin: 4px 14px 14px;
        padding: 6px 8px;
        min-width: 320px;
        background: var(--bg);
        border: 1px solid var(--border-strong);
        border-radius: 4px;
        color: #eee;
        font: inherit;
      }
      .prompt-input:focus { outline: none; border-color: #6a7; }
      .textwin-body {
        margin: 0;
        padding: 14px 18px;
        color: #ddc;
        font-size: 14px;
        line-height: 1.3;
        overflow-y: auto;
      }

      /* Graphical tombstone (qt_rip.cpp / win/X11/rip.xpm) */
      .tombstone { display: flex; flex-direction: column; align-items: center; gap: 10px; }
      .tombstone-stage { position: relative; width: min(90vw, 800px); }
      .tombstone-img { width: 100%; image-rendering: pixelated; display: block; border-radius: 4px; }
      .tombstone-text {
        position: absolute;
        width: 26%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        font-family: Georgia, "Times New Roman", serif;
        color: #2a2620;
        pointer-events: none;
      }
      .tombstone-text div {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(7px, 1.6vw, 13px);
        white-space: nowrap;
      }
      .tombstone-footer { color: var(--text-dim); }

      /* Splash screen (Qt shows a title/version splash at startup) */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: radial-gradient(ellipse at center, #1c2620 0%, #0a0d0a 100%);
        color: #cfe8cf;
        text-align: center;
        transition: opacity 0.3s ease-out;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash h1 {
        font-family: var(--font-display);
        font-size: 3em;
        margin: 0;
        letter-spacing: 0.04em;
        color: var(--accent);
        text-shadow: 0 0 18px rgba(233, 196, 106, 0.35);
      }
      #splash .tag { color: #8ab68a; font-size: 1.1em; }
      #splash .version { color: #678; font-size: 0.85em; margin-top: 18px; }
      #splash .hint {
        margin-top: 28px;
        color: #567;
        font-size: 0.85em;
        animation: splash-pulse 1.6s ease-in-out infinite;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }

      /* Save-slot picker (qt_svsel.cpp) */
      #saveselect {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 15;
        align-items: center;
        justify-content: center;
        background: rgba(5, 8, 5, 0.92);
      }
      .saveselect {
        background: var(--panel);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        padding: 24px 28px;
        min-width: 340px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: stretch;
      }
      .saveselect h2 {
        margin: 0 0 2px;
        font-family: var(--font-display);
        color: var(--accent);
        font-size: 1.4em;
        text-align: center;
      }
      /* qt_svsel.cpp header chrome: version + DevTeam attribution */
      .saveselect-version { text-align: center; color: var(--text-dim); font-size: 0.8em; margin-bottom: 4px; }
      .saveselect-list { display: flex; flex-direction: column; gap: 6px; }
      .saveselect-btn {
        background: var(--panel-2);
        border: 1px solid var(--border-strong);
        color: var(--text);
        border-radius: 4px;
        padding: 8px 12px;
        text-align: left;
      }
      .saveselect-btn:hover { background: var(--sel); }
      .saveselect-new { display: flex; gap: 8px; border-top: 1px solid var(--border); padding-top: 12px; }
      .saveselect-new input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border-strong);
        border-radius: 4px;
        color: #eee;
        font: inherit;
        padding: 6px 8px;
      }
      .saveselect-new button {
        background: var(--panel-2);
        border: 1px solid var(--border-strong);
        color: var(--text);
        border-radius: 4px;
        padding: 6px 14px;
      }
      .saveselect-new button:hover { background: var(--sel); }

      /* Character picker (qt_plsel.cpp) — shares the #saveselect overlay */
      .charpick {
        background: var(--panel);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        padding: 22px 26px;
        max-width: min(92vw, 720px);
        max-height: 92vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .charpick h2 {
        margin: 0;
        font-family: var(--font-display);
        color: var(--accent);
        font-size: 1.4em;
        text-align: center;
      }
      .charpick-name { display: flex; align-items: center; gap: 10px; }
      .charpick-name label { color: var(--text-dim); }
      .charpick-name input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border-strong);
        border-radius: 4px;
        color: #eee;
        font: inherit;
        padding: 6px 8px;
      }
      .charpick-name input:focus { outline: none; border-color: #6a7; }
      .charpick-roles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
      .charpick-card {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text);
        padding: 5px 8px;
        text-transform: capitalize;
        text-align: left;
      }
      .charpick-card:hover:not(:disabled) { background: #2b2b3a; }
      .charpick-card.selected { background: var(--sel); border-color: var(--sel-border); color: #fff; }
      .charpick-card:disabled { opacity: 0.25; cursor: default; }
      .charpick-portrait { image-rendering: pixelated; width: 32px; height: 32px; flex-shrink: 0; }
      .charpick-bottom { display: flex; gap: 14px; align-items: flex-start; }
      .charpick-section { flex: 1; display: flex; flex-direction: column; gap: 6px; }
      .charpick-section-label { color: var(--text-dim); font-size: 12px; }
      .charpick-section-body { display: flex; flex-direction: column; gap: 5px; }
      .charpick-summary { text-align: center; color: #8ab68a; font-style: italic; min-height: 1.2em; }
      .charpick-footer { display: flex; justify-content: center; gap: 10px; }
      .charpick-footer button {
        background: var(--panel-2);
        border: 1px solid var(--border-strong);
        color: var(--text);
        border-radius: 4px;
        padding: 7px 22px;
      }
      .charpick-footer button:hover { background: var(--sel); }
      .charpick-footer button.primary { background: #2e4a2e; border-color: #4a6; color: #dfd; }
      .charpick-footer button.primary:hover { background: #3a6a3a; }
    </style>
  </head>
  <body>
    <header>
      <span id="wordmark">NetHack</span>
      <nav id="menubar"></nav>
      <span id="toolbar"></span>
      <span style="flex: 1"></span>
      <span id="header-controls">
        <span class="ctl" id="fontsize">
          Font
          <button id="fontsize-dec" type="button" aria-label="Smaller font">−</button>
          <span id="fontsize-label">Medium</span>
          <button id="fontsize-inc" type="button" aria-label="Larger font">+</button>
        </span>
        <span class="ctl" id="tilesize">
          Tiles
          <button id="tilesize-dec" type="button" aria-label="Smaller tiles">−</button>
          <button id="tilesize-inc" type="button" aria-label="Larger tiles">+</button>
        </span>
        <span class="ctl" id="statuslayout">
          Status
          <button id="statuslayout-toggle" type="button">Grid</button>
        </span>
        <span class="ctl">
          <button id="sidebar-toggle" type="button" title="Show/hide the inventory panel">Inventory</button>
        </span>
      </span>
    </header>
    <div id="toprow">
      <div id="messages"></div>
      <div id="paperdoll"></div>
      <div id="status"></div>
    </div>
    <div id="hsplit" class="splitter-h" title="Drag to resize"></div>
    <div id="main">
      <div id="mapwrap"><canvas id="map" width="1280" height="336"></canvas></div>
      <div id="vsplit" class="splitter-v" title="Drag to resize"></div>
      <div id="sidebar">
        <div id="perminvent"></div>
      </div>
    </div>
    <footer id="footer">
      NetHack is © the NetHack DevTeam, licensed under the
      <a id="license-link" href="#" target="_blank" rel="noopener">NetHack General Public License</a>.
      This is an unofficial, unaffiliated browser port.
    </footer>
    <div id="overlay"></div>
    <div id="saveselect"></div>
    <div id="splash">
      <h1>NetHack</h1>
      <div class="tag">universal</div>
      <div class="version">NetHack 5.0.0 · browser port · by the NetHack DevTeam</div>
      <div class="hint">press any key or click to begin</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
