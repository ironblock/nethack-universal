<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nethack-universal — Phase 0 spike</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        background: #111;
        color: #ddd;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header { padding: 6px 10px; background: #1b1b1b; font-size: 13px; color: #9a9; }
      #status { padding: 4px 10px; background: #161616; color: #cc9; white-space: pre; min-height: 1em; }
      #mapwrap {
        flex: 1;
        overflow: auto;
        min-height: 0;
        background: #000;
      }
      #map {
        image-rendering: pixelated;
        display: block;
      }
      #messages {
        height: 22vh;
        overflow-y: auto;
        padding: 6px 10px;
        background: #0c0c0c;
        border-top: 1px solid #333;
        font-size: 13px;
        color: #bcb;
      }
      #messages div { margin: 1px 0; }

      /* Menu overlay */
      #overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      .menu {
        background: #1a1a1a;
        border: 1px solid #444;
        border-radius: 6px;
        max-height: 82vh;
        max-width: 82vw;
        display: flex;
        flex-direction: column;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
      }
      .menu-title {
        padding: 10px 14px;
        font-weight: 600;
        color: #cdc;
        border-bottom: 1px solid #333;
      }
      .menu-list { overflow-y: auto; padding: 4px 0; }
      .menu-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 3px 14px;
        font-size: 14px;
        color: #ccc;
      }
      .menu-row.header { color: #889; font-weight: 600; padding-top: 8px; }
      .menu-row.selectable { cursor: pointer; }
      .menu-row.selectable:hover { background: #2b2b3a; }
      .menu-row.selected { background: #35406a; color: #fff; }
      .menu-accel {
        display: inline-block;
        width: 1.2em;
        text-align: center;
        color: #e9c46a;
        font-weight: 600;
      }
      .menu-row.selected .menu-accel { color: #fff; }
      .menu-tile { image-rendering: pixelated; width: 24px; height: 24px; }
      .menu-text { flex: 1; }
      .menu-footer {
        padding: 8px 14px;
        border-top: 1px solid #333;
        color: #889;
        font-size: 12px;
      }
      .prompt-input {
        margin: 4px 14px 14px;
        padding: 6px 8px;
        min-width: 320px;
        background: #0c0c0c;
        border: 1px solid #555;
        border-radius: 4px;
        color: #eee;
        font: inherit;
      }
      .prompt-input:focus { outline: none; border-color: #6a7; }
    </style>
  </head>
  <body>
    <header>nethack-universal — arrows move · letters = commands · i = inventory · S = save</header>
    <div id="status"></div>
    <div id="mapwrap"><canvas id="map" width="1280" height="336"></canvas></div>
    <div id="messages"></div>
    <div id="overlay"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
